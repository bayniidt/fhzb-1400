server {
    listen 80;
    server_name fenghe-consult.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name fenghe-consult.com;

    ssl_certificate /etc/nginx/certs/fenghe-consult.com_bundle.pem;
    ssl_certificate_key /etc/nginx/certs/fenghe-consult.com.key;

    client_max_body_size 50m;

    location = /fhzb {
        return 301 https://$host/;
    }

    location ^~ /fhzb/ {
        rewrite ^/fhzb/(.*)$ /$1 permanent;
    }

    location /api/ {
        proxy_pass http://backend:3001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://backend:3001/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
