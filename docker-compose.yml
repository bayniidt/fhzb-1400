services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: fhzb-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=3000
      - HOSTNAME=0.0.0.0
    # No ports exposed directly, handled by gateway

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: fhzb-backend
    restart: unless-stopped
    volumes:
      - sqlite_data:/app/data
      - uploads_data:/app/uploads
    environment:
      - DATABASE_PATH=/app/data/database.sqlite
      - NODE_ENV=production
      - PORT=3001
    # No ports exposed directly, handled by gateway

  gateway:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: fhzb-gateway
    ports:
      - "80:80"
    depends_on:
      - app
      - backend
    restart: unless-stopped

volumes:
  sqlite_data:
  uploads_data:
